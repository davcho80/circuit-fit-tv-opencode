# ============================================================
# Circuit Fit TV — Dépendances de développement
# ------------------------------------------------------------
# Lance tout ce dont le backend a besoin pour tourner en dev :
#   - PostgreSQL 16 (base de données principale)
#   - MinIO (stockage S3-compatible pour les vidéos)
#   - Redis (file d'attente pour les jobs de transcodage)
#   - Adminer (UI web pour inspecter la DB)
#
# Usage :
#   docker compose up -d           # démarre tout en arrière-plan
#   docker compose down            # arrête tout (volumes préservés)
#   docker compose down -v         # arrête tout + supprime les données
#   docker compose logs -f <svc>   # suit les logs d'un service
#
# Le backend Node.js tourne en LOCAL (hors Docker) pendant le dev
# pour bénéficier du hot reload. Il se connecte à ces services via
# localhost sur les ports mappés ci-dessous.
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: cfitv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cfitv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cfitv_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cfitv}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfitv}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cfitv-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cfitv_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cfitv_dev_password}
    ports:
      - "${MINIO_PORT:-9000}:9000"      # API S3
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Crée automatiquement le bucket "videos" au démarrage
  minio-init:
    image: minio/mc:latest
    container_name: cfitv-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-cfitv_admin} ${MINIO_ROOT_PASSWORD:-cfitv_dev_password};
      mc mb --ignore-existing local/videos;
      mc mb --ignore-existing local/thumbnails;
      mc anonymous set download local/videos;
      mc anonymous set download local/thumbnails;
      echo 'Buckets ready.';
      "

  redis:
    image: redis:7-alpine
    container_name: cfitv-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: cfitv-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  redis_data:
